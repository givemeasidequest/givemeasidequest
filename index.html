  function showQuest() {

const random = quests[Math.floor(Math.random()*quests.length)];
const quest = document.getElementById("quest");
  
quest.style.opacity = 0;

setTimeout(() => {
quest.innerText = random;
quest.style.opacity = 1;
},600);

}

function copyQuest() {

const text = document.getElementById("quest").innerText;
navigator.clipboard.writeText(text);
alert("Quest copied!");
// tohle je copy a i animace
}

/* změna theme */
function toggleTheme(){

if(document.body.classList.contains("light")){
document.body.classList.remove("light");
localStorage.setItem("theme","dark");
}else{
document.body.classList.add("light");
localStorage.setItem("theme","light");
}

}

/* načtení uloženého theme při otevření stránky */
window.onload = function(){

const savedTheme = localStorage.getItem("theme");

if(savedTheme === "light"){
document.body.classList.add("light");
}

}
