<!DOCTYPE html>
<html>
<head>
<title>Daily Sidequest</title>

<style>

body{
font-family:Arial;
text-align:center;
padding-top:50px;
background:#111;
color:white;
transition: background 0.4s, color 0.4s;
}

body.light{
background:white;
color:black;
}

h1{
font-size:36px;
}

.quest{
font-size:24px;
margin-top:30px;
opacity:1;
transition:opacity 0.4s;
}

button{
font-size:18px;
padding:10px 20px;
margin-top:20px;
cursor:pointer;
transition: transform 0.15s;
}

button:hover{
transform:scale(1.05);
}

.stats{
margin-top:30px;
font-size:18px;
}

</style>
</head>

<body>

<h1>🎯 Daily Sidequest</h1>

<div class="quest" id="quest"></div>

<button onclick="completeQuest()">Complete Quest</button>
<button onclick="copyQuest()">Copy Quest</button>
<button onclick="toggleTheme()">Switch Theme</button>

<div class="stats">
<p>XP: <span id="xp">0</span></p>
<p>Streak: <span id="streak">0</span> 🔥</p>
</div>

<script>

const quests = [
"Talk to a stranger",
"Learn 5 words in another language",
"Go for a 20 minute walk",
"Clean one drawer",
"Write a message to someone you appreciate",
"Do 20 pushups",
"Read 10 pages of a book",
"Compliment someone",
"Organize your desk",
"Try a new recipe",
"Write a short poem",
"Take a photo of something beautiful",
"Drink a glass of water",
"Do 10 squats",
"Learn one fun fact about space",
"Draw something small",
"Plan your next day",
"Send a thank you message",
"Listen to a new song",
"Do a 5-minute meditation"
];

let xp = localStorage.getItem("xp") || 0;
let streak = localStorage.getItem("streak") || 0;

document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

function getToday(){

return new Date().toDateString();

}

function showQuest(){

const questElement = document.getElementById("quest");

const savedDate = localStorage.getItem("questDate");
const savedQuest = localStorage.getItem("dailyQuest");

if(savedDate === getToday()){

questElement.innerText = savedQuest;
return;

}

const random = quests[Math.floor(Math.random()*quests.length)];

questElement.style.opacity = 0;

setTimeout(()=>{
questElement.innerText = random;
questElement.style.opacity = 1;
},400);

localStorage.setItem("dailyQuest",random);
localStorage.setItem("questDate",getToday());

}

function completeQuest(){

const lastCompleted = localStorage.getItem("lastCompleted");

if(lastCompleted === getToday()){

alert("You already completed today's quest!");
return;

}

xp = Number(xp) + 10;

document.getElementById("xp").innerText = xp;

localStorage.setItem("xp",xp);

const yesterday = new Date();
yesterday.setDate(yesterday.getDate()-1);

if(lastCompleted === yesterday.toDateString()){

streak++;

}else{

streak = 1;

}

document.getElementById("streak").innerText = streak;

localStorage.setItem("streak",streak);
localStorage.setItem("lastCompleted",getToday());

alert("Quest completed! +10 XP");

}

function copyQuest(){

const text = document.getElementById("quest").innerText;
navigator.clipboard.writeText(text);
alert("Quest copied!");

}

function toggleTheme(){

if(document.body.classList.contains("light")){
document.body.classList.remove("light");
localStorage.setItem("theme","dark");
}else{
document.body.classList.add("light");
localStorage.setItem("theme","light");
}

}

window.onload = function(){

showQuest();

const savedTheme = localStorage.getItem("theme");

if(savedTheme === "light"){
document.body.classList.add("light");
}

}

</script>

</body>
</html>
